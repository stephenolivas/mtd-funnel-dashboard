name: Backfill Archive Month

# Manually triggered from GitHub Actions UI.
# Go to: Actions → Backfill Archive Month → Run workflow
# Enter the month in YYYY-MM format (e.g. 2026-03 for March 2026).
on:
  workflow_dispatch:
    inputs:
      month:
        description: "Month to backfill (YYYY-MM format, e.g. 2026-03)"
        required: true
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run backfill for ${{ github.event.inputs.month }}
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python3 -u fetch_and_build.py --month ${{ github.event.inputs.month }}

      - name: Commit and push archive snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archives/
          git diff --staged --quiet || \
            git commit -m "Backfill archive: ${{ github.event.inputs.month }}"
          git push
