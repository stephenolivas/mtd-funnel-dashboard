name: Generate Weekly Report

# Run from GitHub Actions UI:
#   Actions → Generate Weekly Report → Run workflow
#   Enter start_date (Friday) and end_date (Thursday)

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Week start date — Friday (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "Week end date — Thursday (YYYY-MM-DD)"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests

      - name: Fetch data from Close CRM
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: |
          python3 -u generate_report.py \
            --start ${{ github.event.inputs.start_date }} \
            --end   ${{ github.event.inputs.end_date }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install docx

      - name: Generate Word document
        run: node generate_report_docx.js

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || \
            git commit -m "Weekly report: ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }}"
          git pull --rebase --strategy-option=ours
          git push
